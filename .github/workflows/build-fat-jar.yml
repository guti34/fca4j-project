name: Build fca4j-app-light fat JAR (multi-platform)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:

  # ── Job 1 : lib native Linux x86_64 ──────────────────────────────────────
  native-linux-x86_64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install CMake + GCC
        run: sudo apt-get install -y cmake gcc

      - name: Compile
        working-directory: fca4j-core-natif/src/main/native
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DJAVA_HOME=$JAVA_HOME
          cmake --build build --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: native-linux-x86_64
          path: fca4j-core-natif/src/main/native/build/libfca4j_dbasis.so
          if-no-files-found: error

  # ── Job 2 : lib native macOS ARM (M1/M2) ─────────────────────────────────
  native-macos-aarch64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install CMake
        run: brew install cmake

      - name: Compile
        working-directory: fca4j-core-natif/src/main/native
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DJAVA_HOME=$JAVA_HOME
          cmake --build build --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: native-macos-aarch64
          path: fca4j-core-natif/src/main/native/build/libfca4j_dbasis.dylib
          if-no-files-found: error

   # ── Job 3 : fat JAR universel + publication + déclenchement fca4j-ui ─────
  assemble-and-publish:
    runs-on: ubuntu-24.04
    needs: [native-linux-x86_64, native-macos-aarch64]
    permissions:
      contents: write   # nécessaire pour créer/mettre à jour la release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Inject lib Linux
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x86_64
          path: fca4j-core-natif/src/main/resources/native/linux-x86_64/

      - name: Inject lib macOS ARM
        uses: actions/download-artifact@v4
        with:
          name: native-macos-aarch64
          path: fca4j-core-natif/src/main/resources/native/macos-aarch64/

      - name: Build fat JAR
        run: mvn package -pl fca4j-app-light -am -DskipTests

      - name: Renommer pour URL stable
        run: |
          cp fca4j-app-light/target/*-jar-with-dependencies.jar \
             fca4j-app-light/target/fca4j.jar

      - name: Publier sur la release "continuous"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag -f continuous
          git push -f origin continuous
          gh release delete continuous --yes 2>/dev/null || true
          gh release create continuous \
            --title "Latest Build" \
            --notes "Fat JAR multiplateforme (Windows x86_64, Linux x86_64, macOS ARM/Intel)." \
            --prerelease \
            fca4j-app-light/target/fca4j.jar

      - name: Déclencher le build fca4j-ui
        env:
          GITHUB_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          gh api repos/guti34/fca4j-ui/dispatches \
            -f event_type=fat-jar-updated
